<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANZIVO | Premium Luxury Fashion</title>

    <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 80px;
border-bottom:1px solid #222;
}

.logo{
font-size:32px;
font-weight:bold;
letter-spacing:4px;
}

nav a{
color:white;
text-decoration:none;
margin-left:35px;
}

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:70px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
color:#bbb;
margin-bottom:40px;
}

button{
padding:16px 40px;
background:white;
color:black;
border:none;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:gold;
}

section{
padding:80px;
text-align:center;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:40px;
}

.card{
width:280px;
height:360px;
background:#111;
border:1px solid #333;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
}

footer{
padding:40px;
text-align:center;
border-top:1px solid #222;
color:#777;
}

    </style>

</head>

<body>

<header>

<div class="logo">
TANZIVO
</div>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

</header>

<div class="hero">

<h1>Luxury Fashion</h1>

<p>Modern Streetwear Crafted For The Bold.</p>

<button>Shop Now</button>

</div>

<section>

<h2>New Collection</h2>

<div class="cards">

<div class="card">Oversized Tee</div>

<div class="card">Luxury Hoodie</div>

<div class="card">Cargo Collection</div>

</div>

</section>

<footer>

© 2026 TANZIVO. All Rights Reserved.

</footer>

</body>
</html>
